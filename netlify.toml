# netlify.toml
# 
# Netlify deployment configuration for All in 1 Events
# 
# Handles:
# - Serverless function configuration
# - Security headers
# - Redirects
# - Build settings

[build]
  command = "echo 'Static site, no build needed'"
  publish = "."

# ===== SECURITY HEADERS =====
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    
    # Prevent MIME type sniffing
    X-Content-Type-Options = "nosniff"
    
    # Referrer policy
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Content Security Policy
    # - default-src: restrict to same-origin
    # - img-src: allow images from Google's CDN and data URIs
    # - style-src: allow inline styles (Tailwind), Google Fonts
    # - script-src: allow inline + Tailwind CDN
    # - connect-src: allow Anthropic API
    Content-Security-Policy = "default-src 'self'; img-src 'self' https://lh3.googleusercontent.com data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; connect-src 'self' https://api.anthropic.com"
    
    # Permissions policy (formerly Feature Policy)
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# ===== FUNCTIONS =====
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ===== REDIRECTS =====
# No redirects needed for this static site, but here's an example:
# [[redirects]]
#   from = "/api/*"
#   to = "/.netlify/functions/:splat"
#   status = 200

# ===== ENVIRONMENT VARIABLES =====
# Set ANTHROPIC_API_KEY in the Netlify dashboard:
# Site settings → Environment variables → Add new
# Key: ANTHROPIC_API_KEY
# Value: sk-ant-...
